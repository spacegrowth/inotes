name: iNotes
options:
  bundleIdPrefix: com.inotes
  deploymentTarget:
    macOS: "14.0"
packages:
  # Direct-download auto-updates only (Sparkle can't ship in a sandboxed Mac
  # App Store build). Gated behind the SPARKLE_UPDATES compile condition
  # below — see iNotes/Updates/UpdaterManager.swift and DISTRIBUTION.md for
  # how to produce a Sparkle-free MAS build (drop this package + the
  # condition, zero code untangling required).
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0
targets:
  iNotes:
    type: application
    platform: macOS
    sources:
      - iNotes
    dependencies:
      - package: Sparkle
    settings:
      base:
        INFOPLIST_FILE: iNotes/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.inotes.inotes
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: SPARKLE_UPDATES
    scheme:
      testTargets:
        - iNotesTests
  iNotesTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - iNotesTests
    dependencies:
      - target: iNotes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.inotes.inotesTests
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: "YES"
