name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Fetch the latest iNotes.dmg into the site
        # Serve the DMG SAME-ORIGIN from Pages so the download attribute is honored and the file
        # saves as "iNotes.dmg" (cross-origin GitHub links let Safari name it after the page title).
        run: curl -fsSL -o site/iNotes.dmg https://github.com/spacegrowth/inotes/releases/latest/download/iNotes.dmg || echo "no release yet — skipping"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site        # the landing page + appcast live in site/
      - id: deployment
        uses: actions/deploy-pages@v4
